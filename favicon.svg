<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#2a7a7a"/>
  <!-- Graduation cap - top -->
  <polygon points="32,14 8,26 32,38 56,26" fill="#fff"/>
  <!-- Graduation cap - tassel line -->
  <line x1="32" y1="14" x2="32" y2="8" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>
  <!-- Tassel ball -->
  <circle cx="32" cy="7" r="2.5" fill="#f0c040"/>
  <!-- Cap button -->
  <circle cx="32" cy="26" r="2" fill="#2a7a7a"/>
  <!-- Book/building base -->
  <path d="M16,30 L16,44 Q32,52 48,44 L48,30 L32,38 L16,30 Z" fill="rgba(255,255,255,0.7)"/>
  <!-- Tassel string hanging right -->
  <path d="M32,14 Q40,18 44,24" stroke="#f0c040" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Tassel end -->
  <line x1="44" y1="24" x2="44" y2="32" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>
</svg>
