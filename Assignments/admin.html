<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignments Admin</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f0f4f4; margin: 0; padding: 24px; font-size: 13px; }
  h2 { color: #2a7a7a; margin: 0 0 4px; }
  .subtitle { color: #888; margin: 0 0 24px; font-size: 12px; }

  .layout { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }

  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 24px; min-width: 320px; }
  .card h3 { margin: 0 0 18px; color: #333; font-size: 14px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-weight: 600; color: #555; margin-bottom: 5px; }

  .toggle-group { display: flex; gap: 6px; }
  .toggle-btn { padding: 7px 18px; border-radius: 6px; border: 2px solid #ccc; background: #fff;
                cursor: pointer; font-size: 13px; font-weight: 600; color: #555; transition: 0.1s; }
  .toggle-btn:hover { opacity: 0.8; }
  .toggle-btn.t-eddie.active { background: #2a7a7a; color: #fff; border-color: #2a7a7a; }
  .toggle-btn.t-dara.active  { background: #1a5fb4; color: #fff; border-color: #1a5fb4; }

  select, input[type=text] {
    width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 13px; background: #fafafa;
  }
  select:focus, input[type=text]:focus { outline: none; border-color: #2a7a7a; background: #fff; }

  .row2 { display: flex; gap: 10px; }
  .row2 .field { flex: 1; }

  .btn-add { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #2a7a7a;
             color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 4px; }
  .btn-add:hover { background: #1f5c5c; }
  .btn-add:active { transform: scale(0.98); }

  .toast { margin-top: 12px; padding: 8px 12px; border-radius: 6px; font-weight: 600;
           font-size: 12px; display: none; }
  .toast.success { background: #d4edda; color: #155724; display: block; }
  .toast.error   { background: #f8d7da; color: #721c24; display: block; }

  /* Data card */
  .data-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
               padding: 24px; flex: 1; min-width: 420px; }
  .data-card h3 { margin: 0 0 14px; color: #333; font-size: 14px; }

  .data-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .data-tab { padding: 6px 14px; border-radius: 6px; border: 2px solid #ccc; background: #fff;
              cursor: pointer; font-size: 12px; font-weight: 600; color: #555; }
  .data-tab.active-eddie { background: #2a7a7a; color: #fff; border-color: #2a7a7a; }
  .data-tab.active-dara  { background: #1a5fb4; color: #fff; border-color: #1a5fb4; }

  table.list { border-collapse: collapse; width: 100%; }
  table.list th { background: #f4f4f4; padding: 7px 10px; text-align: left; font-size: 11px;
                  color: #666; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid #e0e0e0;
                  cursor: pointer; user-select: none; white-space: nowrap; }
  table.list th:hover { background: #eaeaea; }
  table.list th:last-child { cursor: default; }
  table.list th:last-child:hover { background: #f4f4f4; }
  table.list th .sort-arrow { font-size: 10px; margin-left: 3px; color: #999; }
  table.list td { padding: 7px 10px; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
  table.list tr:last-child td { border-bottom: none; }
  table.list tr:hover td { background: #f9f9f9; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-start { background: #fdecea; color: #c0392b; }
  .badge-prog  { background: #fef3e2; color: #e67e22; }
  .badge-done  { background: #eaf4ea; color: #27ae60; }

  .btn-edit { background: none; border: none; cursor: pointer; color: #bbb; font-size: 13px; padding: 0 4px; }
  .btn-edit:hover { color: #2a7a7a; }
  .btn-del { background: none; border: none; cursor: pointer; color: #bbb; font-size: 13px; padding: 0 4px; }
  .btn-del:hover { color: #c0392b; }
  .btn-cancel-edit { width: 100%; padding: 8px; border-radius: 8px; border: 2px solid #ccc; background: #fff;
                     color: #555; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 6px; }
  .btn-cancel-edit:hover { background: #f5f5f5; }

  .empty { color: #aaa; font-style: italic; font-size: 12px; padding: 12px 0; }

  .status-edit { padding: 3px 7px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px;
                 background: #fafafa; cursor: pointer; }
  .status-edit:focus { outline: none; }

  a.view-link { display: inline-block; margin-top: 16px; color: #2a7a7a; font-size: 12px; font-weight: 600; text-decoration: none; }
  a.view-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<h2>📝 Assignments Admin</h2>
<p class="subtitle">Albert Park College – Add &amp; manage assignments</p>

<div class="layout">

  <!-- Add form -->
  <div class="card">
    <h3>Add Assignment</h3>

    <div class="field">
      <label>Student</label>
      <div class="toggle-group">
        <button class="toggle-btn t-eddie active" id="s-eddie" onclick="setStudent('eddie')">Eddie</button>
        <button class="toggle-btn t-dara"         id="s-dara"  onclick="setStudent('dara')">Dara</button>
      </div>
    </div>

    <div class="field">
      <label>Subject</label>
      <select id="subjectSel"></select>
    </div>

    <div class="field">
      <label>Title</label>
      <input type="text" id="titleInput" placeholder="e.g. Chapter 5 Review"
             onkeydown="if(event.key==='Enter') addAssignment()">
    </div>

    <div class="field">
      <label>Due date</label>
      <input type="text" id="dueInput" placeholder="e.g. Mar 27 or 27 Mar, 4:30 PM">
    </div>

    <div class="row2">
      <div class="field">
        <label>Term</label>
        <select id="termSel">
          <option value="1">Term 1</option>
          <option value="2">Term 2</option>
          <option value="3">Term 3</option>
          <option value="4">Term 4</option>
        </select>
      </div>
      <div class="field">
        <label>Week</label>
        <select id="weekSel">
          <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
          <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Status</label>
      <select id="statusSel">
        <option>Not Started</option>
        <option>In Progress</option>
        <option>Completed</option>
      </select>
    </div>

    <button class="btn-add" id="submitBtn" onclick="addAssignment()">Add Assignment</button>
    <button class="btn-cancel-edit" id="cancelBtn" style="display:none" onclick="cancelEdit()">Cancel Edit</button>
    <div class="toast" id="toast"></div>
  </div>

  <!-- Current assignments -->
  <div class="data-card">
    <h3>Current Assignments</h3>
    <div class="data-tabs">
      <button class="data-tab active-eddie" id="tab-eddie" onclick="setViewStudent('eddie')">Eddie</button>
      <button class="data-tab"              id="tab-dara"  onclick="setViewStudent('dara')">Dara</button>
    </div>
    <div id="dataView"></div>
    <a class="view-link" href="/" target="_blank">Open assignments page ↗</a>
  </div>

</div>

<script>
  const SUBJECTS = {
    eddie: ['Accounting','Business Mgt','English','Maths','Physical Education','Pos Ed','Sociology'],
    dara:  ['Digital Art','English','Food','French','Humanities','Leadership','Maths','Philosophy','Pos Ed','Science','Volleyball']
  };

  let formStudent = 'eddie';
  let viewStudent = 'eddie';
  let data = null;
  let editingId = null;
  let sortCol   = 'term';
  let sortAsc   = true;

  async function loadData() {
    const resp = await fetch('/api/data');
    data = await resp.json();
    renderDataView();
  }

  // ── Form ──────────────────────────────────────────────────────────────────────

  function setStudent(s) {
    formStudent = s;
    document.getElementById('s-eddie').classList.toggle('active', s === 'eddie');
    document.getElementById('s-dara').classList.toggle('active',  s === 'dara');
    populateSubjects();
  }

  function populateSubjects() {
    const sel = document.getElementById('subjectSel');
    sel.innerHTML = '';
    SUBJECTS[formStudent].forEach(sub => {
      const o = document.createElement('option');
      o.value = o.textContent = sub;
      sel.appendChild(o);
    });
  }

  async function addAssignment() {
    const subject = document.getElementById('subjectSel').value;
    const title   = document.getElementById('titleInput').value.trim();
    const due     = document.getElementById('dueInput').value.trim();
    const term    = document.getElementById('termSel').value;
    const week    = document.getElementById('weekSel').value;
    const status  = document.getElementById('statusSel').value;

    if (!title) { showToast('Please enter a title.', false); return; }

    if (editingId !== null) {
      const resp = await fetch('/api/edit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: editingId, subject, title, due, term, week, status })
      });
      const result = await resp.json();
      if (result.ok) {
        cancelEdit();
        showToast('Assignment updated!', true);
        await loadData();
      } else {
        showToast(result.error || 'Error saving.', false);
      }
      return;
    }

    const resp = await fetch('/api/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ student: formStudent, subject, title, due, term, week, status })
    });
    const result = await resp.json();

    if (result.ok) {
      document.getElementById('titleInput').value = '';
      document.getElementById('dueInput').value   = '';
      showToast('Assignment added!', true);
      await loadData();
    } else {
      showToast(result.error || 'Error saving.', false);
    }
  }

  function startEdit(id) {
    const entry = data[viewStudent].find(e => e.id === id);
    if (!entry) return;

    editingId = id;
    setStudent(viewStudent);

    document.getElementById('subjectSel').value = entry.subject;
    document.getElementById('titleInput').value = entry.title;
    document.getElementById('dueInput').value = entry.due;
    document.getElementById('termSel').value = entry.term;
    document.getElementById('weekSel').value = entry.week;
    document.getElementById('statusSel').value = entry.status;

    document.getElementById('submitBtn').textContent = 'Save Changes';
    document.getElementById('cancelBtn').style.display = 'block';

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    editingId = null;
    document.getElementById('titleInput').value = '';
    document.getElementById('dueInput').value = '';
    document.getElementById('statusSel').value = 'Not Started';
    document.getElementById('submitBtn').textContent = 'Add Assignment';
    document.getElementById('cancelBtn').style.display = 'none';
  }

  function showToast(msg, ok) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (ok ? 'success' : 'error');
    setTimeout(() => t.className = 'toast', 3000);
  }

  // ── View ──────────────────────────────────────────────────────────────────────

  function setViewStudent(s) {
    viewStudent = s;
    document.getElementById('tab-eddie').className = 'data-tab' + (s==='eddie' ? ' active-eddie' : '');
    document.getElementById('tab-dara').className  = 'data-tab' + (s==='dara'  ? ' active-dara'  : '');
    renderDataView();
  }

  function sortBy(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    renderDataView();
  }

  function sortArrow(col) {
    if (sortCol !== col) return '';
    return `<span class="sort-arrow">${sortAsc ? '▲' : '▼'}</span>`;
  }

  function renderDataView() {
    if (!data) return;
    const list = (data[viewStudent] || []).slice().sort((a, b) => {
      const av = a[sortCol] ?? '';
      const bv = b[sortCol] ?? '';
      const n = typeof av === 'number' ? av - bv : String(av).localeCompare(String(bv));
      return sortAsc ? n : -n;
    });
    const view = document.getElementById('dataView');

    if (!list.length) {
      view.innerHTML = '<p class="empty">No assignments yet.</p>';
      return;
    }

    let html = `<table class="list">
      <thead><tr>
        <th onclick="sortBy('subject')">Subject ${sortArrow('subject')}</th>
        <th onclick="sortBy('title')">Title ${sortArrow('title')}</th>
        <th onclick="sortBy('due')">Due ${sortArrow('due')}</th>
        <th onclick="sortBy('term')">T ${sortArrow('term')}</th>
        <th onclick="sortBy('week')">W ${sortArrow('week')}</th>
        <th onclick="sortBy('status')">Status ${sortArrow('status')}</th>
        <th></th>
      </tr></thead>
      <tbody>`;

    list.forEach(r => {
      const badgeClass = r.status === 'Completed' ? 'badge-done' : r.status === 'In Progress' ? 'badge-prog' : 'badge-start';
      html += `<tr>
        <td style="font-weight:700;color:${viewStudent==='eddie'?'#2a7a7a':'#1a5fb4'}">${r.subject}</td>
        <td>${r.title}</td>
        <td style="white-space:nowrap;color:#666">${r.due || ''}</td>
        <td style="color:#aaa">${r.term}</td>
        <td style="color:#aaa">${r.week}</td>
        <td>
          <select class="status-edit" onchange="updateStatus(${r.id},this)">
            <option ${r.status==='Not Started'?'selected':''}>Not Started</option>
            <option ${r.status==='In Progress'?'selected':''}>In Progress</option>
            <option ${r.status==='Completed'?'selected':''}>Completed</option>
          </select>
        </td>
        <td>
          <button class="btn-edit" title="Edit" onclick="startEdit(${r.id})">✎</button>
          <button class="btn-del" title="Delete" onclick="deleteAssignment(${r.id},'${viewStudent}')">✕</button>
        </td>
      </tr>`;
    });

    html += '</tbody></table>';
    view.innerHTML = html;
  }

  async function updateStatus(id, sel) {
    const entry = data[viewStudent].find(e => e.id === id);
    if (entry) entry.status = sel.value;
    await fetch('/api/update_status', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, status: sel.value })
    });
  }

  async function deleteAssignment(id, student) {
    if (!confirm('Remove this assignment?')) return;
    await fetch('/api/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, student })
    });
    await loadData();
  }

  populateSubjects();
  loadData();
</script>
</body>
</html>
